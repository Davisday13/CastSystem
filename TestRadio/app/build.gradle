plugins { id 'com.android.application' }

android {
    compileSdk 34
    namespace 'com.testradio'

    defaultConfig {
        applicationId "com.testradio"
        minSdk 14
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release { minifyEnabled false }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
